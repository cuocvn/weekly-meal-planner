<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Meal Planner — Redirecting...</title>

  <!--
    ROOT REDIRECT FILE
    ==================
    This file lives at the repository root so GitHub Pages
    (which serves from the root by default) automatically
    redirects visitors to the real app at /public/index.html.

    Two redirect methods are used for maximum compatibility:
      1. <meta http-equiv="refresh"> — instant HTML redirect
      2. window.location JavaScript fallback
  -->
  <meta http-equiv="refresh" content="0; url=./public/index.html" />
  <link rel="canonical" href="./public/index.html" />

  <style>
    /* Minimal branded loading screen shown during redirect */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #F7F8FC;
      color: #1A1D2E;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .logo  { font-size: 3rem; animation: pulse 1.4s ease-in-out infinite; }
    .title { font-size: 1.25rem; font-weight: 700; color: #6366F1; }
    .sub   { font-size: 0.875rem; color: #94A3B8; }
    .link  { color: #6366F1; text-decoration: underline; font-size: 0.875rem; margin-top: 8px; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  </style>
</head>
<body>

  <div class="logo" aria-hidden="true">🥗</div>
  <p class="title">Weekly Meal Planner</p>
  <p class="sub">Redirecting you to the app…</p>
  <a class="link" href="./public/index.html">Click here if you are not redirected automatically</a>

  <!-- JavaScript fallback redirect -->
  <script>
    // Redirect immediately; the meta refresh is the primary method,
    // this script fires as a belt-and-suspenders fallback.
    (function () {
      window.location.replace("./public/index.html");
    })();
  </script>

</body>
</html>
